        url: >-
          https://developer.visa.com/capabilities/visa-stop-payment-service/docs-getting-started
    description: >-
      Visa Europe Payment Stop Service is a feature offered by Visa that allows cardholders
      to temporarily suspend or cancel any recurring or future payments set up with
      their Visa card. This can be helpful in cases where cardholders have lost their
      card, suspect fraudulent activity, or simply want to pause payments for a period
      of time.
  - aid: visa:visa-subscription-manager
    name: Visa Subscription Manager
    tags: []
    humanURL: https://developer.visa.com/capabilities/visa-subscription-manager
    properties:
      - type: Documentation
        url: https://developer.visa.com/capabilities/visa-subscription-manager
    description: >-
      Visa Subscription Manager is a service that allows consumers to easily manage
      and control their recurring payments and subscriptions. With this platform,
      users can view all of their recurring charges in one place, set reminders for
      upcoming payments, and easily cancel or change subscriptions as needed. This
      tool provides consumers with greater transparency and control over their spending,
      helping them to better manage their finances and avoid unexpected charges.
  - aid: visa:order-insight-digital
    name: Order Insight Digital
    tags: []
    humanURL: https://developer.visa.com/capabilities/visa-cardholder-purchase-inquiry
    properties:
      - type: Documentation
        url: >-
          https://developer.visa.com/capabilities/visa-cardholder-purchase-inquiry
    description: >-
      When cardholders are reviewing their card statement, confusion over if a purchase
      is legitimate is one of the most common occurrances. A cardholders first reaction
      when this occurs is typically to pick up the phone to contact the issuing bank,
      tying up valuable issuer resources in an attempt to identify this purchase and/or
      pursue a dispute.
  - aid: visa:visa-dcvv2-generate
    name: Visa dCVV2 Generate
    tags: []
    humanURL: https://developer.visa.com/capabilities/visa-dcvv2-generate
    properties:
      - type: Documentation
        url: >-
          https://developer.visa.com/capabilities/visa-dcvv2-generate/docs-getting-started
    description: >-
      Visa dCVV2 Generate is a tool designed to help businesses generate dynamic card
      verification values (dCVV2) for online transactions. This security feature adds
      an extra layer of protection by providing a unique code that is only valid for
      a short period of time, making it more difficult for fraudsters to use stolen
      card information for unauthorized purchases.
  - aid: visa:visa-risk-manager
    name: Visa Risk Manager
    tags: []
    humanURL: https://developer.visa.com/capabilities/vrm
    properties:
      - type: Documentation
        url: https://developer.visa.com/capabilities/vrm
    description: >-
      Visa Risk Manager is a web portal that provides a comprehensive suite of fraud
      and risk management tools that can be accessed through Visa Online 24/7. It
      is specifically designed to help issuers optimize fraud loss prevention and
      maximize profitability by providing clients with an effective transaction risk
      management decisioning system.
  - aid: visa:visa-token-service
    name: Visa Token Service
    tags: []
    humanURL: https://developer.visa.com/capabilities/vts
    properties:
      - type: Documentation
        url: https://developer.visa.com/capabilities/vts/docs
    description: >-
      Visa Token Service is a technology solution that aims to enhance the security
      and convenience of digital payments. It replaces sensitive card information
      with a unique digital identifier, called a token, which is used for payment
      transactions. This ensures that actual card details are not shared during the
      transaction process, reducing the risk of fraud and unauthorized access to payment
      information.
  - aid: visa:visa-token-service-provisioning-and-credential-management
    name: Visa Token Service Provisioning and Credential Management
    tags: []
    humanURL: https://developer.visa.com/capabilities/token-service-provisioning
    properties:
      - type: Documentation
        url: https://developer.visa.com/capabilities/token-service-provisioning
    description: >-
      Visa Token Service Provisioning and Credential Management is a secure platform
      that allows consumers to make purchases using a tokenized payment method, which
      replaces sensitive payment information with a unique token. This platform provisions
      tokens to mobile devices, wearables, and other connected devices, enabling consumers
      to make fast and secure payments without exposing their actual payment card
      details.
  - aid: visa:merchant-search
    name: Merchant Search
    tags:
      - Merchants
      - Search
    humanURL: https://developer.visa.com/capabilities/merchant_search
    properties:
      - url: openapi/visa-merchant-search.yml
        type: OpenAPI
      - type: Documentation
        url: https://developer.visa.com/capabilities/merchant_search/docs
    description: >-
      Introducing Merchant Search, a cutting-edge API designed to elevate your transaction
      experience and enhance data quality. This innovative solution provides you with
      enriched and precise merchant data, creating a more transparent and effective
      transaction process. Merchant Search is more than just an API, it's a tool that
      empowers businesses by improving data accuracy, streamlining operations, and
      providing insights for better decision-making.
  - aid: visa:visa-b2b-connect
    name: Visa B2B Connect
    tags:
      - B2B
      - Payments
    humanURL: https://developer.visa.com/capabilities/vba
    properties:
      - url: openapi/visa-b2b-connect.yml
        type: OpenAPI
      - type: Documentation
        url: https://developer.visa.com/capabilities/vba/docs
    description: >-
      Visa B2B Connect is built on Visa's capabilities and formidable core
      payments experience with distributed ledger technology to provide direct
      settlements of large-value transactions. Visa B2B Connect can help
      financial institutions and their clients overcome costly processes and
      geographic barriers, which translates to an improved, seamless end-to-end
      experience.
  - aid: >-
      visa:visa-b2b-connect-is-built-on-visa-s-capabilities-and-formidable-core-payments-experience-with-distributed-ledger-technology-to-provide-direct-settlements-of-large-value-transactions-visa-b2b-connect-can-help-financial-institutions-and-their-clients-overcome-costly-processes-and-geographic-barriers-which-translates-to-an-improved-seamless-end-to-end-experience-
    name: >-
      Visa B2B Connect is built on Visa's capabilities and formidable core
