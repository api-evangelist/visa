naftiko: 1.0.0-alpha2
info:
  label: B2B Virtual Account Payment Method — Workflows
  description: 'B2B Virtual Account Payment Method — Workflows. 5 operations. Lead operation: Health Check Service. Self-contained
    Naftiko capability covering one Visa business surface.'
  tags:
  - Visa
  - Workflows
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    VISA_API_KEY: VISA_API_KEY
capability:
  consumes:
  - type: http
    namespace: b2b-virtual-account-payment-method-workflows
    baseUri: https://sandbox.api.visa.com
    description: B2B Virtual Account Payment Method — Workflows business capability. Self-contained, no shared references.
    resources:
    - name: pop-v1-hcs-healthCheckService
      path: /pop/v1/hcs/healthCheckService
      operations:
      - name: healthcheck
        method: POST
        description: Health Check Service
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: pop-v1-notification-generate
      path: /pop/v1/notification/generate
      operations:
      - name: notificationgenerate
        method: POST
        description: Generate Notification
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: pop-v1-recipes-Payment
      path: /pop/v1/recipes/Payment
      operations:
      - name: recipespayments
        method: POST
        description: Payments Recipe
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: X-Payment-Action-Type
          in: header
          type: string
          description: Describes what payment action is to be performed. It can be process, resend or cancel
          required: true
        - name: X-IPaaS
          in: header
          type: string
          description: Describes what iPaaS is the source system for this request
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: pop-v1-recipes-getPaymentDetails
      path: /pop/v1/recipes/getPaymentDetails
      operations:
      - name: getpaymentdetails
        method: POST
        description: Get Payment Details - Recipe
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: X-IPaaS
          in: header
          type: string
          description: Describes what iPaaS is the source system for this request
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: pop-v1-register-client
      path: /pop/v1/register/client
      operations:
      - name: post
        method: POST
        description: Client Registration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: b2b-virtual-account-payment-method-workflows-rest
    port: 8080
    description: REST adapter for B2B Virtual Account Payment Method — Workflows. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/pop/v1/hcs/healthcheckservice
      name: pop-v1-hcs-healthcheckservice
      description: REST surface for pop-v1-hcs-healthCheckService.
      operations:
      - method: POST
        name: healthcheck
        description: Health Check Service
        call: b2b-virtual-account-payment-method-workflows.healthcheck
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/pop/v1/notification/generate
      name: pop-v1-notification-generate
      description: REST surface for pop-v1-notification-generate.
      operations:
      - method: POST
        name: notificationgenerate
        description: Generate Notification
        call: b2b-virtual-account-payment-method-workflows.notificationgenerate
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/pop/v1/recipes/payment
      name: pop-v1-recipes-payment
      description: REST surface for pop-v1-recipes-Payment.
      operations:
      - method: POST
        name: recipespayments
        description: Payments Recipe
        call: b2b-virtual-account-payment-method-workflows.recipespayments
        with:
          X-Payment-Action-Type: rest.X-Payment-Action-Type
          X-IPaaS: rest.X-IPaaS
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/pop/v1/recipes/getpaymentdetails
      name: pop-v1-recipes-getpaymentdetails
      description: REST surface for pop-v1-recipes-getPaymentDetails.
      operations:
      - method: POST
        name: getpaymentdetails
        description: Get Payment Details - Recipe
        call: b2b-virtual-account-payment-method-workflows.getpaymentdetails
        with:
          X-IPaaS: rest.X-IPaaS
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/pop/v1/register/client
      name: pop-v1-register-client
      description: REST surface for pop-v1-register-client.
      operations:
      - method: POST
        name: post
        description: Client Registration
        call: b2b-virtual-account-payment-method-workflows.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: b2b-virtual-account-payment-method-workflows-mcp
    port: 9090
    transport: http
    description: MCP adapter for B2B Virtual Account Payment Method — Workflows. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: health-check-service
      description: Health Check Service
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: b2b-virtual-account-payment-method-workflows.healthcheck
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: generate-notification
      description: Generate Notification
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: b2b-virtual-account-payment-method-workflows.notificationgenerate
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: payments-recipe
      description: Payments Recipe
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: b2b-virtual-account-payment-method-workflows.recipespayments
      with:
        X-Payment-Action-Type: tools.X-Payment-Action-Type
        X-IPaaS: tools.X-IPaaS
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-payment-details-recipe
      description: Get Payment Details - Recipe
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: b2b-virtual-account-payment-method-workflows.getpaymentdetails
      with:
        X-IPaaS: tools.X-IPaaS
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: client-registration
      description: Client Registration
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: b2b-virtual-account-payment-method-workflows.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
