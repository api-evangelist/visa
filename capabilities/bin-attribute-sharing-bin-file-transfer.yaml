naftiko: 1.0.0-alpha2
info:
  label: Visa BIN Attribute Sharing Service — BIN File Transfer
  description: 'Visa BIN Attribute Sharing Service — BIN File Transfer. 1 operations. Lead operation: BIN File Transfer. Self-contained
    Naftiko capability covering one Visa business surface.'
  tags:
  - Visa
  - BIN File Transfer
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    VISA_API_KEY: VISA_API_KEY
capability:
  consumes:
  - type: http
    namespace: bin-attribute-sharing-bin-file-transfer
    baseUri: https://sandbox.api.visa.com
    description: Visa BIN Attribute Sharing Service — BIN File Transfer business capability. Self-contained, no shared references.
    resources:
    - name: filedeliveryservice-v1-binFileTransfer
      path: /filedeliveryservice/v1/binFileTransfer
      operations:
      - name: binfiletransferpost
        method: POST
        description: BIN File Transfer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: bin-attribute-sharing-bin-file-transfer-rest
    port: 8080
    description: REST adapter for Visa BIN Attribute Sharing Service — BIN File Transfer. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/filedeliveryservice/v1/binfiletransfer
      name: filedeliveryservice-v1-binfiletransfer
      description: REST surface for filedeliveryservice-v1-binFileTransfer.
      operations:
      - method: POST
        name: binfiletransferpost
        description: BIN File Transfer
        call: bin-attribute-sharing-bin-file-transfer.binfiletransferpost
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bin-attribute-sharing-bin-file-transfer-mcp
    port: 9090
    transport: http
    description: MCP adapter for Visa BIN Attribute Sharing Service — BIN File Transfer. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: bin-file-transfer
      description: BIN File Transfer
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: bin-attribute-sharing-bin-file-transfer.binfiletransferpost
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
