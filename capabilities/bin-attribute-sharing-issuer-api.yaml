naftiko: 1.0.0-alpha2
info:
  label: Visa BIN Attribute Sharing Service — Issuer API
  description: 'Visa BIN Attribute Sharing Service — Issuer API. 2 operations. Lead operation: Files Metadata. Self-contained
    Naftiko capability covering one Visa business surface.'
  tags:
  - Visa
  - Issuer API
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    VISA_API_KEY: VISA_API_KEY
capability:
  consumes:
  - type: http
    namespace: bin-attribute-sharing-issuer-api
    baseUri: https://sandbox.api.visa.com
    description: Visa BIN Attribute Sharing Service — Issuer API business capability. Self-contained, no shared references.
    resources:
    - name: vbass-v1-files-metadata
      path: /vbass/v1/files/metadata
      operations:
      - name: vbassfilesmetadatalookupusingpost
        method: POST
        description: Files Metadata
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: vbass-v1-files-transfers
      path: /vbass/v1/files/transfers
      operations:
      - name: vbassfiletransferpost
        method: POST
        description: File Transfer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: bin-attribute-sharing-issuer-api-rest
    port: 8080
    description: REST adapter for Visa BIN Attribute Sharing Service — Issuer API. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/vbass/v1/files/metadata
      name: vbass-v1-files-metadata
      description: REST surface for vbass-v1-files-metadata.
      operations:
      - method: POST
        name: vbassfilesmetadatalookupusingpost
        description: Files Metadata
        call: bin-attribute-sharing-issuer-api.vbassfilesmetadatalookupusingpost
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/vbass/v1/files/transfers
      name: vbass-v1-files-transfers
      description: REST surface for vbass-v1-files-transfers.
      operations:
      - method: POST
        name: vbassfiletransferpost
        description: File Transfer
        call: bin-attribute-sharing-issuer-api.vbassfiletransferpost
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bin-attribute-sharing-issuer-api-mcp
    port: 9090
    transport: http
    description: MCP adapter for Visa BIN Attribute Sharing Service — Issuer API. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: files-metadata
      description: Files Metadata
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: bin-attribute-sharing-issuer-api.vbassfilesmetadatalookupusingpost
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: file-transfer
      description: File Transfer
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: bin-attribute-sharing-issuer-api.vbassfiletransferpost
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
