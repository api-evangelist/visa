naftiko: 1.0.0-alpha2
info:
  label: Visa BIN Attribute Sharing Service — Single BIN Lookup
  description: 'Visa BIN Attribute Sharing Service — Single BIN Lookup. 2 operations. Lead operation: PAN TOKEN Lookup Using
    POST. Self-contained Naftiko capability covering one Visa business surface.'
  tags:
  - Visa
  - Single BIN Lookup
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    VISA_API_KEY: VISA_API_KEY
capability:
  consumes:
  - type: http
    namespace: bin-attribute-sharing-single-bin-lookup
    baseUri: https://sandbox.api.visa.com
    description: Visa BIN Attribute Sharing Service — Single BIN Lookup business capability. Self-contained, no shared references.
    resources:
    - name: v1-paymentAccountLookup
      path: /v1/paymentAccountLookup
      operations:
      - name: pantokenlookupusingpostv1
        method: POST
        description: PAN TOKEN Lookup Using POST
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v2-paymentAccountLookup
      path: /v2/paymentAccountLookup
      operations:
      - name: pantokenlookupusingpostv2
        method: POST
        description: PAN TOKEN Lookup Using POST V2
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: bin-attribute-sharing-single-bin-lookup-rest
    port: 8080
    description: REST adapter for Visa BIN Attribute Sharing Service — Single BIN Lookup. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/v1/paymentaccountlookup
      name: v1-paymentaccountlookup
      description: REST surface for v1-paymentAccountLookup.
      operations:
      - method: POST
        name: pantokenlookupusingpostv1
        description: PAN TOKEN Lookup Using POST
        call: bin-attribute-sharing-single-bin-lookup.pantokenlookupusingpostv1
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/paymentaccountlookup
      name: v2-paymentaccountlookup
      description: REST surface for v2-paymentAccountLookup.
      operations:
      - method: POST
        name: pantokenlookupusingpostv2
        description: PAN TOKEN Lookup Using POST V2
        call: bin-attribute-sharing-single-bin-lookup.pantokenlookupusingpostv2
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bin-attribute-sharing-single-bin-lookup-mcp
    port: 9090
    transport: http
    description: MCP adapter for Visa BIN Attribute Sharing Service — Single BIN Lookup. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: pan-token-lookup-using-post
      description: PAN TOKEN Lookup Using POST
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: bin-attribute-sharing-single-bin-lookup.pantokenlookupusingpostv1
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: pan-token-lookup-using-post-2
      description: PAN TOKEN Lookup Using POST V2
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: bin-attribute-sharing-single-bin-lookup.pantokenlookupusingpostv2
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
