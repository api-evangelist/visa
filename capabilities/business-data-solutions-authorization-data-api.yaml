naftiko: 1.0.0-alpha2
info:
  label: Visa Business Data Solutions — Authorization Data API
  description: 'Visa Business Data Solutions — Authorization Data API. 1 operations. Lead operation: Get Authorization Data.
    Self-contained Naftiko capability covering one Visa business surface.'
  tags:
  - Visa
  - Authorization Data API
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    VISA_API_KEY: VISA_API_KEY
capability:
  consumes:
  - type: http
    namespace: business-data-solutions-authorization-data-api
    baseUri: https://sandbox.api.visa.com
    description: Visa Business Data Solutions — Authorization Data API business capability. Self-contained, no shared references.
    resources:
    - name: vbs-dapi-v1-transactions-auth
      path: /vbs/dapi/v1/transactions/auth
      operations:
      - name: getauthdatausingpost
        method: POST
        description: Get Authorization Data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: clientId
          in: header
          type: string
          description: clientId
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
  exposes:
  - type: rest
    namespace: business-data-solutions-authorization-data-api-rest
    port: 8080
    description: REST adapter for Visa Business Data Solutions — Authorization Data API. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/vbs/dapi/v1/transactions/auth
      name: vbs-dapi-v1-transactions-auth
      description: REST surface for vbs-dapi-v1-transactions-auth.
      operations:
      - method: POST
        name: getauthdatausingpost
        description: Get Authorization Data
        call: business-data-solutions-authorization-data-api.getauthdatausingpost
        with:
          clientId: rest.clientId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: business-data-solutions-authorization-data-api-mcp
    port: 9090
    transport: http
    description: MCP adapter for Visa Business Data Solutions — Authorization Data API. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: get-authorization-data
      description: Get Authorization Data
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: business-data-solutions-authorization-data-api.getauthdatausingpost
      with:
        clientId: tools.clientId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
