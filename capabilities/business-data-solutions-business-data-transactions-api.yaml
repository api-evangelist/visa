naftiko: 1.0.0-alpha2
info:
  label: Visa Business Data Solutions — Business Data Transactions API
  description: 'Visa Business Data Solutions — Business Data Transactions API. 2 operations. Lead operation: Get card transaction
    data. Self-contained Naftiko capability covering one Visa business surface.'
  tags:
  - Visa
  - Business Data Transactions API
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    VISA_API_KEY: VISA_API_KEY
capability:
  consumes:
  - type: http
    namespace: business-data-solutions-business-data-transactions-api
    baseUri: https://sandbox.api.visa.com
    description: Visa Business Data Solutions — Business Data Transactions API business capability. Self-contained, no shared
      references.
    resources:
    - name: cdsapi-commercial-v1-ob-trxndata
      path: /cdsapi/commercial/v1/ob/trxndata
      operations:
      - name: gettransactiondatadetail
        method: POST
        description: Get card transaction data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: clientId
          in: header
          type: string
          description: Client Identification Code
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: vbs-dapi-v1-transaction_enhanced
      path: /vbs/dapi/v1/transaction_enhanced
      operations:
      - name: fetchtransactiondata
        method: POST
        description: Get Transaction and Enhanced Data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: clientId
          in: header
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: business-data-solutions-business-data-transactions-api-rest
    port: 8080
    description: REST adapter for Visa Business Data Solutions — Business Data Transactions API. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/cdsapi/commercial/v1/ob/trxndata
      name: cdsapi-commercial-v1-ob-trxndata
      description: REST surface for cdsapi-commercial-v1-ob-trxndata.
      operations:
      - method: POST
        name: gettransactiondatadetail
        description: Get card transaction data
        call: business-data-solutions-business-data-transactions-api.gettransactiondatadetail
        with:
          clientId: rest.clientId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/vbs/dapi/v1/transaction-enhanced
      name: vbs-dapi-v1-transaction-enhanced
      description: REST surface for vbs-dapi-v1-transaction_enhanced.
      operations:
      - method: POST
        name: fetchtransactiondata
        description: Get Transaction and Enhanced Data
        call: business-data-solutions-business-data-transactions-api.fetchtransactiondata
        with:
          clientId: rest.clientId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: business-data-solutions-business-data-transactions-api-mcp
    port: 9090
    transport: http
    description: MCP adapter for Visa Business Data Solutions — Business Data Transactions API. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: get-card-transaction-data
      description: Get card transaction data
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: business-data-solutions-business-data-transactions-api.gettransactiondatadetail
      with:
        clientId: tools.clientId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-transaction-and-enhanced-data
      description: Get Transaction and Enhanced Data
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: business-data-solutions-business-data-transactions-api.fetchtransactiondata
      with:
        clientId: tools.clientId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
