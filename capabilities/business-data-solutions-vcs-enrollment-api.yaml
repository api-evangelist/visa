naftiko: 1.0.0-alpha2
info:
  label: Visa Business Data Solutions — VCS Enrollment API
  description: 'Visa Business Data Solutions — VCS Enrollment API. 3 operations. Lead operation: Get Status. Self-contained
    Naftiko capability covering one Visa business surface.'
  tags:
  - Visa
  - VCS Enrollment API
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    VISA_API_KEY: VISA_API_KEY
capability:
  consumes:
  - type: http
    namespace: business-data-solutions-vcs-enrollment-api
    baseUri: https://sandbox.api.visa.com
    description: Visa Business Data Solutions — VCS Enrollment API business capability. Self-contained, no shared references.
    resources:
    - name: CPRWeb-getUserStatus
      path: /CPRWeb/getUserStatus
      operations:
      - name: get
        method: GET
        description: Get Status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: clientId
          in: header
          type: string
          description: As part of the onboarding the clientId will be provided by Visa. Please pass the same clientId for
            every request.
          required: true
        - name: userEmail
          in: query
          type: string
          description: Email Id of the registered user.
          required: true
        - name: service
          in: query
          type: string
          description: This is the service code correspond to the service you want to subscribe to. Code is VSCB for Visa
            Spand Clarity for Business.
          required: true
    - name: vocs-v1-register
      path: /vocs/v1/register
      operations:
      - name: put
        method: PUT
        description: VCS Registration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: post
        method: POST
        description: VCS Registration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: business-data-solutions-vcs-enrollment-api-rest
    port: 8080
    description: REST adapter for Visa Business Data Solutions — VCS Enrollment API. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/cprweb/getuserstatus
      name: cprweb-getuserstatus
      description: REST surface for CPRWeb-getUserStatus.
      operations:
      - method: GET
        name: get
        description: Get Status
        call: business-data-solutions-vcs-enrollment-api.get
        with:
          clientId: rest.clientId
          userEmail: rest.userEmail
          service: rest.service
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/vocs/v1/register
      name: vocs-v1-register
      description: REST surface for vocs-v1-register.
      operations:
      - method: PUT
        name: put
        description: VCS Registration
        call: business-data-solutions-vcs-enrollment-api.put
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: post
        description: VCS Registration
        call: business-data-solutions-vcs-enrollment-api.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: business-data-solutions-vcs-enrollment-api-mcp
    port: 9090
    transport: http
    description: MCP adapter for Visa Business Data Solutions — VCS Enrollment API. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: get-status
      description: Get Status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: business-data-solutions-vcs-enrollment-api.get
      with:
        clientId: tools.clientId
        userEmail: tools.userEmail
        service: tools.service
      outputParameters:
      - type: object
        mapping: $.
    - name: vcs-registration
      description: VCS Registration
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: business-data-solutions-vcs-enrollment-api.put
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: vcs-registration-2
      description: VCS Registration
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: business-data-solutions-vcs-enrollment-api.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
