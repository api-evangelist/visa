naftiko: 1.0.0-alpha2
info:
  label: Card on File Data Inquiry — Card on File Data Inquiry API
  description: 'Card on File Data Inquiry — Card on File Data Inquiry API. 1 operations. Lead operation: Inquire Card on File
    Data. Self-contained Naftiko capability covering one Visa business surface.'
  tags:
  - Visa
  - Card on File Data Inquiry API
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    VISA_API_KEY: VISA_API_KEY
capability:
  consumes:
  - type: http
    namespace: card-on-file-data-inquiry-card-on-file-data-inquiry-api
    baseUri: https://sandbox.api.visa.com
    description: Card on File Data Inquiry — Card on File Data Inquiry API business capability. Self-contained, no shared
      references.
    resources:
    - name: cofds-v1-dataInquiry
      path: /cofds/v1/dataInquiry
      operations:
      - name: inquirecardonfiledata
        method: POST
        description: Inquire Card on File Data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: card-on-file-data-inquiry-card-on-file-data-inquiry-api-rest
    port: 8080
    description: REST adapter for Card on File Data Inquiry — Card on File Data Inquiry API. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/cofds/v1/datainquiry
      name: cofds-v1-datainquiry
      description: REST surface for cofds-v1-dataInquiry.
      operations:
      - method: POST
        name: inquirecardonfiledata
        description: Inquire Card on File Data
        call: card-on-file-data-inquiry-card-on-file-data-inquiry-api.inquirecardonfiledata
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: card-on-file-data-inquiry-card-on-file-data-inquiry-api-mcp
    port: 9090
    transport: http
    description: MCP adapter for Card on File Data Inquiry — Card on File Data Inquiry API. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: inquire-card-file-data
      description: Inquire Card on File Data
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: card-on-file-data-inquiry-card-on-file-data-inquiry-api.inquirecardonfiledata
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
