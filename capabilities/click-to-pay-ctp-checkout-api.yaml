naftiko: 1.0.0-alpha2
info:
  label: Visa Click to Pay — CTP Checkout API
  description: 'Visa Click to Pay — CTP Checkout API. 2 operations. Lead operation: Initiate Checkout. Self-contained Naftiko
    capability covering one Visa business surface.'
  tags:
  - Visa
  - CTP Checkout API
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    VISA_API_KEY: VISA_API_KEY
capability:
  consumes:
  - type: http
    namespace: click-to-pay-ctp-checkout-api
    baseUri: https://sandbox.api.visa.com
    description: Visa Click to Pay — CTP Checkout API business capability. Self-contained, no shared references.
    resources:
    - name: visasrci-v1-checkout
      path: /visasrci/v1/checkout
      operations:
      - name: initiatecheckout
        method: POST
        description: Initiate Checkout
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: visasrci-v1-checkout-checkoutId
      path: /visasrci/v1/checkout/{checkoutId}
      operations:
      - name: getcheckoutstatus
        method: GET
        description: Get Checkout Status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: click-to-pay-ctp-checkout-api-rest
    port: 8080
    description: REST adapter for Visa Click to Pay — CTP Checkout API. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/visasrci/v1/checkout
      name: visasrci-v1-checkout
      description: REST surface for visasrci-v1-checkout.
      operations:
      - method: POST
        name: initiatecheckout
        description: Initiate Checkout
        call: click-to-pay-ctp-checkout-api.initiatecheckout
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/visasrci/v1/checkout/{checkoutid}
      name: visasrci-v1-checkout-checkoutid
      description: REST surface for visasrci-v1-checkout-checkoutId.
      operations:
      - method: GET
        name: getcheckoutstatus
        description: Get Checkout Status
        call: click-to-pay-ctp-checkout-api.getcheckoutstatus
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: click-to-pay-ctp-checkout-api-mcp
    port: 9090
    transport: http
    description: MCP adapter for Visa Click to Pay — CTP Checkout API. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: initiate-checkout
      description: Initiate Checkout
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: click-to-pay-ctp-checkout-api.initiatecheckout
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-checkout-status
      description: Get Checkout Status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: click-to-pay-ctp-checkout-api.getcheckoutstatus
      outputParameters:
      - type: object
        mapping: $.
