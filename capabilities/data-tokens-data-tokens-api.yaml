naftiko: 1.0.0-alpha2
info:
  label: Visa Data Tokens — Data Tokens API
  description: 'Visa Data Tokens — Data Tokens API. 2 operations. Lead operation: Request Data Token. Self-contained Naftiko
    capability covering one Visa business surface.'
  tags:
  - Visa
  - Data Tokens API
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    VISA_API_KEY: VISA_API_KEY
capability:
  consumes:
  - type: http
    namespace: data-tokens-data-tokens-api
    baseUri: https://sandbox.api.visa.com
    description: Visa Data Tokens — Data Tokens API business capability. Self-contained, no shared references.
    resources:
    - name: vdt-v1-tokens
      path: /vdt/v1/tokens
      operations:
      - name: requestdatatoken
        method: POST
        description: Request Data Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: vdt-v1-tokens-tokenId
      path: /vdt/v1/tokens/{tokenId}
      operations:
      - name: getdatatoken
        method: GET
        description: Retrieve Data Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: tokenId
          in: path
          type: string
          description: Unique identifier of the data token
          required: true
  exposes:
  - type: rest
    namespace: data-tokens-data-tokens-api-rest
    port: 8080
    description: REST adapter for Visa Data Tokens — Data Tokens API. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/vdt/v1/tokens
      name: vdt-v1-tokens
      description: REST surface for vdt-v1-tokens.
      operations:
      - method: POST
        name: requestdatatoken
        description: Request Data Token
        call: data-tokens-data-tokens-api.requestdatatoken
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/vdt/v1/tokens/{tokenid}
      name: vdt-v1-tokens-tokenid
      description: REST surface for vdt-v1-tokens-tokenId.
      operations:
      - method: GET
        name: getdatatoken
        description: Retrieve Data Token
        call: data-tokens-data-tokens-api.getdatatoken
        with:
          tokenId: rest.tokenId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: data-tokens-data-tokens-api-mcp
    port: 9090
    transport: http
    description: MCP adapter for Visa Data Tokens — Data Tokens API. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: request-data-token
      description: Request Data Token
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: data-tokens-data-tokens-api.requestdatatoken
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-data-token
      description: Retrieve Data Token
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: data-tokens-data-tokens-api.getdatatoken
      with:
        tokenId: tools.tokenId
      outputParameters:
      - type: object
        mapping: $.
