    resources:
    - name: atmlocator-v1-findgeocodes
      path: /atmlocator/v1/findgeocodes
      operations:
      - name: findgeocodes
        method: POST
        description: Find Geocodes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: atmlocator-v1-findnearbyatms
      path: /atmlocator/v1/findnearbyatms
      operations:
      - name: findnearbyatms
        method: POST
        description: Find Nearby ATMs
        outputRawFormat: json
        outputParameters:
        - name: result
