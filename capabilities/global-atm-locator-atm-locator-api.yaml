      operation, prefixed with /v1.
    resources:
    - path: /v1/atmlocator/v1/findgeocodes
      name: atmlocator-v1-findgeocodes
      description: REST surface for atmlocator-v1-findgeocodes.
      operations:
      - method: POST
        name: findgeocodes
        description: Find Geocodes
        call: global-atm-locator-atm-locator-api.findgeocodes
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
