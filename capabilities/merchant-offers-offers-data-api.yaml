naftiko: 1.0.0-alpha2
info:
  label: Visa Merchant Offers Resource Center — Offers Data API
  description: 'Visa Merchant Offers Resource Center — Offers Data API. 3 operations. Lead operation: Get All Offers. Self-contained
    Naftiko capability covering one Visa business surface.'
  tags:
  - Visa
  - Offers Data API
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    VISA_API_KEY: VISA_API_KEY
capability:
  consumes:
  - type: http
    namespace: merchant-offers-offers-data-api
    baseUri: https://sandbox.api.visa.com
    description: Visa Merchant Offers Resource Center — Offers Data API business capability. Self-contained, no shared references.
    resources:
    - name: vmorc-offers-v1-all
      path: /vmorc/offers/v1/all
      operations:
      - name: getalloffers
        method: GET
        description: Get All Offers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: language
          in: query
          type: string
          description: Language code for offer content
        - name: start_index
          in: query
          type: integer
          description: Starting index for pagination
        - name: max_offers
          in: query
          type: integer
          description: Maximum number of offers to return
        - name: category
          in: query
          type: string
          description: Offer category filter
        - name: country
          in: query
          type: integer
          description: Country code filter
        - name: merchant
          in: query
          type: string
          description: Merchant name filter
    - name: vmorc-offers-v1-byfilter
      path: /vmorc/offers/v1/byfilter
      operations:
      - name: getoffersbyfilter
        method: GET
        description: Get Offers By Filter
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: language
          in: query
          type: string
          description: Language code for offer content
        - name: business_segment
          in: query
          type: integer
          description: Business segment filter
        - name: card_product_type
          in: query
          type: string
          description: Card product type filter
        - name: promotion_channel
          in: query
          type: string
          description: Promotion channel filter
        - name: start_index
          in: query
          type: integer
          description: Starting index for pagination
        - name: max_offers
          in: query
          type: integer
          description: Maximum number of offers to return
    - name: vmorc-offers-v1-byofferid
      path: /vmorc/offers/v1/byofferid
      operations:
      - name: getofferbyid
        method: GET
        description: Get Offer By ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: offerid
          in: query
          type: integer
          description: Unique identifier of the offer
          required: true
        - name: language
          in: query
          type: string
          description: Language code for offer content
  exposes:
  - type: rest
    namespace: merchant-offers-offers-data-api-rest
    port: 8080
    description: REST adapter for Visa Merchant Offers Resource Center — Offers Data API. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/vmorc/offers/v1/all
      name: vmorc-offers-v1-all
      description: REST surface for vmorc-offers-v1-all.
      operations:
      - method: GET
        name: getalloffers
        description: Get All Offers
        call: merchant-offers-offers-data-api.getalloffers
        with:
          language: rest.language
          start_index: rest.start_index
          max_offers: rest.max_offers
          category: rest.category
          country: rest.country
          merchant: rest.merchant
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/vmorc/offers/v1/byfilter
      name: vmorc-offers-v1-byfilter
      description: REST surface for vmorc-offers-v1-byfilter.
      operations:
      - method: GET
        name: getoffersbyfilter
        description: Get Offers By Filter
        call: merchant-offers-offers-data-api.getoffersbyfilter
        with:
          language: rest.language
          business_segment: rest.business_segment
          card_product_type: rest.card_product_type
          promotion_channel: rest.promotion_channel
          start_index: rest.start_index
          max_offers: rest.max_offers
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/vmorc/offers/v1/byofferid
      name: vmorc-offers-v1-byofferid
      description: REST surface for vmorc-offers-v1-byofferid.
      operations:
      - method: GET
        name: getofferbyid
        description: Get Offer By ID
        call: merchant-offers-offers-data-api.getofferbyid
        with:
          offerid: rest.offerid
          language: rest.language
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: merchant-offers-offers-data-api-mcp
    port: 9090
    transport: http
    description: MCP adapter for Visa Merchant Offers Resource Center — Offers Data API. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: get-all-offers
      description: Get All Offers
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: merchant-offers-offers-data-api.getalloffers
      with:
        language: tools.language
        start_index: tools.start_index
        max_offers: tools.max_offers
        category: tools.category
        country: tools.country
        merchant: tools.merchant
      outputParameters:
      - type: object
        mapping: $.
    - name: get-offers-filter
      description: Get Offers By Filter
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: merchant-offers-offers-data-api.getoffersbyfilter
      with:
        language: tools.language
        business_segment: tools.business_segment
        card_product_type: tools.card_product_type
        promotion_channel: tools.promotion_channel
        start_index: tools.start_index
        max_offers: tools.max_offers
      outputParameters:
      - type: object
        mapping: $.
    - name: get-offer-id
      description: Get Offer By ID
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: merchant-offers-offers-data-api.getofferbyid
      with:
        offerid: tools.offerid
        language: tools.language
      outputParameters:
      - type: object
        mapping: $.
