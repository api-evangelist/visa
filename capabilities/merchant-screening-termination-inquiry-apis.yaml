naftiko: 1.0.0-alpha2
info:
  label: Visa Merchant Screening Service — Termination Inquiry APIs
  description: 'Visa Merchant Screening Service — Termination Inquiry APIs. 2 operations. Lead operation: Get Retroactive
    Alert. Self-contained Naftiko capability covering one Visa business surface.'
  tags:
  - Visa
  - Termination Inquiry APIs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    VISA_API_KEY: VISA_API_KEY
capability:
  consumes:
  - type: http
    namespace: merchant-screening-termination-inquiry-apis
    baseUri: https://sandbox.api.visa.com
    description: Visa Merchant Screening Service — Termination Inquiry APIs business capability. Self-contained, no shared
      references.
    resources:
    - name: vmss-v2-retroAlertTerminated
      path: /vmss/v2/retroAlertTerminated
      operations:
      - name: retroactivealertofterminatedmerchantsoragent
        method: POST
        description: Get Retroactive Alert
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Content-Type
          in: header
          type: string
          description: application/json
        - name: request-message-id
          in: header
          type: string
          description: A user-defined message identifier for the request submitted.
        - name: request-message-ts
          in: header
          type: string
          description: A user-entered date and timestamp in GMT for the request submitted.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: vmss-v2-searchTerminatedRequest
      path: /vmss/v2/searchTerminatedRequest
      operations:
      - name: searchterminatedmerchantsoragent
        method: POST
        description: Search Terminated Merchant
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Content-Type
          in: header
          type: string
          description: application/json
        - name: request-message-id
          in: header
          type: string
          description: A user-defined message identifier for the request submitted.
        - name: request-message-ts
          in: header
          type: string
          description: A user-entered date and timestamp in GMT for the request submitted.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: merchant-screening-termination-inquiry-apis-rest
    port: 8080
    description: REST adapter for Visa Merchant Screening Service — Termination Inquiry APIs. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/vmss/v2/retroalertterminated
      name: vmss-v2-retroalertterminated
      description: REST surface for vmss-v2-retroAlertTerminated.
      operations:
      - method: POST
        name: retroactivealertofterminatedmerchantsoragent
        description: Get Retroactive Alert
        call: merchant-screening-termination-inquiry-apis.retroactivealertofterminatedmerchantsoragent
        with:
          Content-Type: rest.Content-Type
          request-message-id: rest.request-message-id
          request-message-ts: rest.request-message-ts
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/vmss/v2/searchterminatedrequest
      name: vmss-v2-searchterminatedrequest
      description: REST surface for vmss-v2-searchTerminatedRequest.
      operations:
      - method: POST
        name: searchterminatedmerchantsoragent
        description: Search Terminated Merchant
        call: merchant-screening-termination-inquiry-apis.searchterminatedmerchantsoragent
        with:
          Content-Type: rest.Content-Type
          request-message-id: rest.request-message-id
          request-message-ts: rest.request-message-ts
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: merchant-screening-termination-inquiry-apis-mcp
    port: 9090
    transport: http
    description: MCP adapter for Visa Merchant Screening Service — Termination Inquiry APIs. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: get-retroactive-alert
      description: Get Retroactive Alert
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: merchant-screening-termination-inquiry-apis.retroactivealertofterminatedmerchantsoragent
      with:
        Content-Type: tools.Content-Type
        request-message-id: tools.request-message-id
        request-message-ts: tools.request-message-ts
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: search-terminated-merchant
      description: Search Terminated Merchant
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: merchant-screening-termination-inquiry-apis.searchterminatedmerchantsoragent
      with:
        Content-Type: tools.Content-Type
        request-message-id: tools.request-message-id
        request-message-ts: tools.request-message-ts
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
