naftiko: 1.0.0-alpha2
info:
  label: Visa Merchant Search — Nearby Merchants API
  description: 'Visa Merchant Search — Nearby Merchants API. 1 operations. Lead operation: Find Nearby Merchants. Self-contained
    Naftiko capability covering one Visa business surface.'
  tags:
  - Visa
  - Nearby Merchants API
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    VISA_API_KEY: VISA_API_KEY
capability:
  consumes:
  - type: http
    namespace: merchant-search-nearby-merchants-api
    baseUri: https://sandbox.api.visa.com
    description: Visa Merchant Search — Nearby Merchants API business capability. Self-contained, no shared references.
    resources:
    - name: merchantsearch-v1-nearbymerchants
      path: /merchantsearch/v1/nearbymerchants
      operations:
      - name: findnearbymerchants
        method: POST
        description: Find Nearby Merchants
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: merchant-search-nearby-merchants-api-rest
    port: 8080
    description: REST adapter for Visa Merchant Search — Nearby Merchants API. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/merchantsearch/v1/nearbymerchants
      name: merchantsearch-v1-nearbymerchants
      description: REST surface for merchantsearch-v1-nearbymerchants.
      operations:
      - method: POST
        name: findnearbymerchants
        description: Find Nearby Merchants
        call: merchant-search-nearby-merchants-api.findnearbymerchants
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: merchant-search-nearby-merchants-api-mcp
    port: 9090
    transport: http
    description: MCP adapter for Visa Merchant Search — Nearby Merchants API. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: find-nearby-merchants
      description: Find Nearby Merchants
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: merchant-search-nearby-merchants-api.findnearbymerchants
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
