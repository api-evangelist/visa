naftiko: 1.0.0-alpha2
info:
  label: Visa Merchant Search — Transaction Enrichment API
  description: 'Visa Merchant Search — Transaction Enrichment API. 1 operations. Lead operation: Enrich Transaction. Self-contained
    Naftiko capability covering one Visa business surface.'
  tags:
  - Visa
  - Transaction Enrichment API
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    VISA_API_KEY: VISA_API_KEY
capability:
  consumes:
  - type: http
    namespace: merchant-search-transaction-enrichment-api
    baseUri: https://sandbox.api.visa.com
    description: Visa Merchant Search — Transaction Enrichment API business capability. Self-contained, no shared references.
    resources:
    - name: merchantsearch-v1-transactionenrichment
      path: /merchantsearch/v1/transactionenrichment
      operations:
      - name: enrichtransaction
        method: POST
        description: Enrich Transaction
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: merchant-search-transaction-enrichment-api-rest
    port: 8080
    description: REST adapter for Visa Merchant Search — Transaction Enrichment API. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/merchantsearch/v1/transactionenrichment
      name: merchantsearch-v1-transactionenrichment
      description: REST surface for merchantsearch-v1-transactionenrichment.
      operations:
      - method: POST
        name: enrichtransaction
        description: Enrich Transaction
        call: merchant-search-transaction-enrichment-api.enrichtransaction
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: merchant-search-transaction-enrichment-api-mcp
    port: 9090
    transport: http
    description: MCP adapter for Visa Merchant Search — Transaction Enrichment API. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: enrich-transaction
      description: Enrich Transaction
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: merchant-search-transaction-enrichment-api.enrichtransaction
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
