        description: Download
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: inputFileId
          in: query
          type: string
          description: Id of request file supplied at time of upload
          required: true
    - name: visasuppliermatchingservice-v1-status
      path: /visasuppliermatchingservice/v1/status
      operations:
      - name: status
        method: GET
        description: Status
