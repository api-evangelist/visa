naftiko: 1.0.0-alpha2
info:
  label: Visa Supplier Matching Service — Visa Supplier Matching Service Bulk API
  description: 'Visa Supplier Matching Service — Visa Supplier Matching Service Bulk API. 3 operations. Lead operation: Download.
