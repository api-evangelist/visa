naftiko: 1.0.0-alpha2
info:
  label: Visa Transaction Controls — Alert History API
  description: 'Visa Transaction Controls — Alert History API. 1 operations. Lead operation: Get Alert History. Self-contained
    Naftiko capability covering one Visa business surface.'
  tags:
  - Visa
  - Alert History API
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    VISA_API_KEY: VISA_API_KEY
capability:
  consumes:
  - type: http
    namespace: transaction-controls-alert-history-api
    baseUri: https://sandbox.api.visa.com
    description: Visa Transaction Controls — Alert History API business capability. Self-contained, no shared references.
    resources:
    - name: vctc-alerthistory-v1-alerthistoryinquiry
      path: /vctc/alerthistory/v1/alerthistoryinquiry
      operations:
      - name: getalerthistory
        method: POST
        description: Get Alert History
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: transaction-controls-alert-history-api-rest
    port: 8080
    description: REST adapter for Visa Transaction Controls — Alert History API. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/vctc/alerthistory/v1/alerthistoryinquiry
      name: vctc-alerthistory-v1-alerthistoryinquiry
      description: REST surface for vctc-alerthistory-v1-alerthistoryinquiry.
      operations:
      - method: POST
        name: getalerthistory
        description: Get Alert History
        call: transaction-controls-alert-history-api.getalerthistory
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: transaction-controls-alert-history-api-mcp
    port: 9090
    transport: http
    description: MCP adapter for Visa Transaction Controls — Alert History API. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: get-alert-history
      description: Get Alert History
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: transaction-controls-alert-history-api.getalerthistory
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
