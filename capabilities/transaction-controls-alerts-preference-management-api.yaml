naftiko: 1.0.0-alpha2
info:
  label: Visa Transaction Controls — Alerts Preference Management API
  description: 'Visa Transaction Controls — Alerts Preference Management API. 1 operations. Lead operation: Manage Alerts
    Preference. Self-contained Naftiko capability covering one Visa business surface.'
  tags:
  - Visa
  - Alerts Preference Management API
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    VISA_API_KEY: VISA_API_KEY
capability:
  consumes:
  - type: http
    namespace: transaction-controls-alerts-preference-management-api
    baseUri: https://sandbox.api.visa.com
    description: Visa Transaction Controls — Alerts Preference Management API business capability. Self-contained, no shared
      references.
    resources:
    - name: vctc-alertspreference-v1-managealertspreference
      path: /vctc/alertspreference/v1/managealertspreference
      operations:
      - name: managealertspreference
        method: POST
        description: Manage Alerts Preference
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: transaction-controls-alerts-preference-management-api-rest
    port: 8080
    description: REST adapter for Visa Transaction Controls — Alerts Preference Management API. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/vctc/alertspreference/v1/managealertspreference
      name: vctc-alertspreference-v1-managealertspreference
      description: REST surface for vctc-alertspreference-v1-managealertspreference.
      operations:
      - method: POST
        name: managealertspreference
        description: Manage Alerts Preference
        call: transaction-controls-alerts-preference-management-api.managealertspreference
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: transaction-controls-alerts-preference-management-api-mcp
    port: 9090
    transport: http
    description: MCP adapter for Visa Transaction Controls — Alerts Preference Management API. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: manage-alerts-preference
      description: Manage Alerts Preference
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: transaction-controls-alerts-preference-management-api.managealertspreference
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
